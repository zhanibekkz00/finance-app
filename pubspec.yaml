name: finance_app
description: "Cross-platform personal finance manager"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.2.0
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.2

  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Database
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.2+1
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Charts
  fl_chart: ^0.66.2

  # Utilities
  intl: ^0.20.2
  google_fonts: ^6.1.0
  uuid: ^4.3.3
  path_provider: ^2.1.2
  file_picker: ^8.0.0
  flutter_local_notifications: ^17.0.0
  shared_preferences: ^2.2.2
  share_plus: ^7.2.2
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true
